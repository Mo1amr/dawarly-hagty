<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المواهب | دورلي حاجتي</title>
  <link rel="stylesheet" href="css/talents.css">
</head>
<body>
  <header class="navbar">
    <h1 class="logo">دورلي حاجتي</h1>
    <nav>
      <ul>
        <li><a href="index.html">الرئيسية</a></li>
        <li><a href="products.html">كراكيب</a></li>
        <li><a href="add-item.html">أضف منتج</a></li>
        <li><a href="talents.html" class="active">المواهب</a></li>
       <li><a href="talent-grid.html">الفيديوهات</a></li>
        <li><a href="contact.html">تواصل معنا</a></li>
        <li id="adminLink" style="display:none;">
        <a href="admin.html">🛠 لوحة التحكم</a>
      </li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="talents-section">
      <h2>المواهب المميزة</h2>
      <p>شوف إبداعات الناس اللي بتحب تعيد الاستخدام بطريقة فنية 👇</p>

      <div class="talents-grid" id="talentsGrid">
        <!-- كروت المواهب هتظهر هنا -->
      </div>
    </section>

    <section class="add-talent-section">
      <h2>أضف موهبتك</h2>
      <p>شاركنا مهارتك أو فكرتك الفنية ❤️</p>

      <form id="addTalentForm" class="add-form">
        <div class="form-group">
          <label for="talentName">اسم الموهبة</label>
          <input type="text" id="talentName" placeholder="مثال: إعادة تدوير الخشب" required>
        </div>

        <div class="form-group">
          <label for="talentCategory">الفئة</label>
          <select id="talentCategory" required>
            <option value="">اختر نوع الموهبة</option>
            <option value="إعادة تدوير">إعادة تدوير</option>
            <option value="رسم">رسم</option>
            <option value="نحت">نحت</option>
            <option value="أعمال يدوية">أعمال يدوية</option>
          </select>
        </div>

        <div class="form-group">
          <label for="talentImage">صورة أو فيديو للموهبة</label>
          <input type="file" id="talentImage" accept="image/*,video/*">
          <div class="preview" id="preview">
            <span>📷 لم يتم اختيار ملف بعد</span>
          </div>
        </div>

        <div class="form-group">
          <label for="talentDesc">وصف الموهبة</label>
          <textarea id="talentDesc" rows="4" placeholder="اكتب وصف بسيط عن موهبتك..." required></textarea>
        </div>

        <button type="submit" class="btn">إضافة الموهبة</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; دورلي حاجتي | مشروع مدرسي 2025 / 2026</p>
  </footer>

  <script src="js/talents.js"></script>
  <script src="js/navbar.js"></script>
</body>
</html>
