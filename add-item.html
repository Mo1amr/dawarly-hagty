  <header class="navbar">
    <h1 class="logo">أضف منتجك</h1>
    <nav>
      <ul>
        <li><a href="index.html">الرئيسية</a></li>

      </li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="add-form-section">
      <h2>أضف منتج جديد</h2>
      <p>املأ البيانات التالية لإضافة منتجك إلى الموقع</p>

      <form id="addProductForm" class="add-form">
        <div class="form-group">
          <label for="productName">اسم المنتج</label>
          <input type="text" id="productName" placeholder="مثال: مكتب خشب طبيعي" required>
        </div>

        <div class="form-group">
          <label for="category">الفئة</label>
          <select id="category" required>
            <option value="">اختر الفئة</option>
            <option value="خشب">خشب</option>
            <option value="هدوم">هدوم</option>
            <option value="ورق">ورق</option>
            <option value="انتيكات">انتيكات</option>
          </select>
        </div>

        <div class="form-group">
          <label for="price">السعر</label>
          <input type="number" id="price" placeholder="اكتب السعر بالجنيه" required>
        </div>

        <div class="form-group">
          <label for="image">صورة المنتج</label>
          <input type="file" id="image" accept="image/*">
          <div class="image-preview" id="imagePreview">
            <span>📷 لم يتم اختيار صورة بعد</span>
          </div>
        </div>

        <div class="form-group">
          <label for="description">الوصف</label>
          <textarea id="description" rows="4" placeholder="صف المنتج بإيجاز..."></textarea>
        </div>

        <button type="submit" class="btn">إضافة المنتج</button>
      </form>

      <p id="message" class="message"></p>
    </section>
  </main>

  <footer class="site-footer">

  </footer>

</body>
</html>
