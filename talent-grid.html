<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المواهب</title>

  <link rel="stylesheet" href="talent-grid.css">
</head>

<body>

<header class="navbar">
  <h1 class="logo">المواهب</h1>

  <nav>
    <ul>
      <li><a href="index.html">الرئيسية</a></li>
      <li><a href="products.html">المنتجات</a></li>
      <li><a href="add-item.html">أضف منتج</a></li>
      <li><a href="talent-grid.html" class="active">المواهب</a></li>
      <li><a href="contact.html">تواصل معنا</a></li>
      <li id="adminLink" style="display:none;">
        <a href="admin.html">🛠 لوحة التحكم</a>
      </li>
    </ul>
  </nav>
</header>

<!-- Top Bar -->
<div class="top-bar">
  <h2>فيديوهات المواهب</h2>
  <button id="openForm" class="btn">+ إضافة فيديو</button>
</div>

<!-- Grid -->
<section id="talents" class="talent-grid"></section>
<!-- Modal -->
<div id="modal" class="modal">

  <div class="modal-box">
    <h3>إضافة فيديو</h3>

    <input type="text" id="name" placeholder="اسمك">
    <textarea id="desc" placeholder="الوصف"></textarea>

    <select id="product">
      <option value="">اختر المنتج</option>
      <option value="خشب">خشب</option>
      <option value="هدوم">هدوم</option>
      <option value="ورق">ورق</option>
    </select>

    <input type="file" id="video" accept="video/*">

    <button id="submit" class="btn">نشر</button>
    <button id="close" class="btn">إغلاق</button>
  </div>

</div>

<script src="talent-grid.js"></script>
<script src="navbar.js"></script>
</body>
</html>
